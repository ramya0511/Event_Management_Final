<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">EventSphere</div>

  <div class="nav-tools">
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterEvents()">
    <select id="locationFilter" onchange="filterEvents()"></select>
    <button onclick="sortByDate()">Sort</button>
    <button onclick="toggleDarkMode()">🌙</button>
    <span id="welcomeUser"></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<header class="hero">
  <h1>Event Dashboard</h1>
  <button class="primary-btn" onclick="openModal()">+ Add Event</button>
</header>

<section class="stats">
  <div class="stat-card"><h2 id="totalEvents">0</h2><p>Total</p></div>
  <div class="stat-card"><h2 id="upcomingEvents">0</h2><p>Upcoming</p></div>
  <div class="stat-card"><h2 id="locationsCount">0</h2><p>Locations</p></div>
</section>

<section class="events-section">
  <div id="eventGrid" class="event-grid"></div>
</section>

<div class="modal" id="eventModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <input type="hidden" id="editId">

    <input type="text" id="title" placeholder="Title">
    <input type="date" id="date">
    <input type="text" id="location" placeholder="Location">

    <input type="text" id="category" placeholder="Category">
    <input type="text" id="image" placeholder="Image URL">

    <input type="number" id="totalSeats" placeholder="Total Seats">

    <textarea id="description" placeholder="Enter full event description" required></textarea>

    <button class="primary-btn" onclick="saveEvent()">Save</button>
  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
